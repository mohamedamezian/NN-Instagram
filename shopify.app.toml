# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "a199ee26b60ef2e5fbfbb8f526c3b525"
name = "NN-Instagram"
application_url = "https://nn-instagram-dupe.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-01"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/webhooks/app/uninstalled"

[[webhooks.subscriptions]]
topics = ["app/scopes_update"]
uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_metaobjects,write_files,write_metaobject_definitions,write_metaobjects,write_products,write_themes"

[auth]
redirect_urls = [
  "https://nn-instagram-dupe.vercel.app/auth/callback",
  "https://nn-instagram-dupe.vercel.app/auth/shopify/callback",
  "https://nn-instagram-dupe.vercel.app/api/auth/callback",
  "https://nn-instagram-dupe.vercel.app/instagram/callback",
]
